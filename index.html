<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Crypto Exchange Demo</title>
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #0b1220;
      --accent: #22c55e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--secondary);
      color: #e5e7eb;
    }

    /* 顶部导航 */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      font-weight: bold;
      color: var(--primary);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: var(--primary);
      color: white;
    }

    /* 主区域 */
    .container {
      padding: 40px;
    }

    .card {
      background: #111827;
      padding: 24px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #0b1220;
      color: white;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .success {
      margin-top: 16px;
      color: var(--accent);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">MINDROCK</div>
    <button class="nav-btn">登录</button>
  </div>

  <div class="container">
    <div class="card">
      <div class="title">兑换 USDT</div>

      <input class="input" placeholder="输入 BTC 数量" />
      <input class="input" placeholder="输入 USDT 数量" />

      <button class="btn-primary">立即兑换</button>

      <div class="success">✔ 当前行情上涨 +2.4%</div>
    </div>
  </div>

</body>
</html>
